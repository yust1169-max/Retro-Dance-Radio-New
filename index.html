<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/28VKXjCx/logo.png">
  <title>RetroDance Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0d0d0d;
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .app-bg {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    .bg-sphere {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(225,29,72,0.18) 0%, transparent 70%);
      z-index: 0;
      filter: blur(80px);
      animation: sphereMove 30s infinite alternate linear;
      pointer-events: none;
    }
    @keyframes sphereMove {
      from { transform: translate(-15%, -15%) scale(1.2); }
      to   { transform: translate(15%, 15%) scale(0.9); }
    }
    .glass-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(45,0,10,0.88);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 48px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 4px;
    }
    .live-badge {
      font-size: 10px;
      font-weight: 700;
      color: #e11d48;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .listeners-count { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.12em; }
    .cover-wrapper {
      width: 260px;
      height: 260px;
      margin: 0 auto 28px;
      background: #1a1a1a;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #cover-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
    .track-info { margin-bottom: 24px; }
    .station-name {
      font-size: 26px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      line-height: 1;
    }
    .accent { color: #e11d48; }
    #artist-el { font-size: 10px; font-weight: 700; color: #fb7185; text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.85; margin-bottom: 8px; }
    #title-el {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1.25;
      min-height: 2.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
    }
    .custom-player { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .sound-bars { display: flex; align-items: flex-end; gap: 3px; height: 28px; }
    .sound-bars span { display: block; width: 4px; border-radius: 2px; background: rgba(225,29,72,0.35); height: 6px; }
    .sound-bars.playing span { background: #e11d48; animation: bar-bounce 1.2s ease-in-out infinite; }
    .sound-bars.playing span:nth-child(1) { animation-delay: 0s; }
    .sound-bars.playing span:nth-child(2) { animation-delay: 0.15s; }
    .sound-bars.playing span:nth-child(3) { animation-delay: 0.3s; }
    .sound-bars.playing span:nth-child(4) { animation-delay: 0.1s; }
    .sound-bars.playing span:nth-child(5) { animation-delay: 0.25s; }
    @keyframes bar-bounce { 0%, 100% { height: 6px; } 50% { height: 26px; } }
    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #e11d48, #9f1239);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(225,29,72,0.45);
      transition: transform 0.15s ease;
    }
    .play-btn:active { transform: scale(0.92); }
    .play-btn svg { width: 28px; height: 28px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; }
    .vol-slider { -webkit-appearance: none; width: 70px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #e11d48; cursor: pointer; }
    .legal { font-size: 9px; opacity: 0.4; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app-bg">
    <div class="bg-sphere"></div>
    <div class="glass-card">
      <div class="card-header">
        <span class="live-badge">● Live</span>
        <span class="listeners-count" id="listeners-el">Слушатели: 0</span>
      </div>
      <div class="cover-wrapper">
        <img id="cover-img" src="https://i.postimg.cc/28VKXjCx/logo.png" alt="Album cover">
      </div>
      <div class="track-info">
        <h1 class="station-name">Retro<span class="accent">Dance</span></h1>
        <p id="artist-el">Retro Radio</p>
        <p id="title-el">Нажмите Play</p>
      </div>
      <!-- Плеер без src в начале -->
      <audio id="player" preload="none"></audio>
      <div class="custom-player">
        <div class="sound-bars" id="sound-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <button class="play-btn" id="play-btn">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5.14v14l11-7-11-7z"/>
          </svg>
        </button>
        <div class="volume-wrap">
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
      <p class="legal">Radio Retro Dance &copy; 2026<br>Powered by laut.fm</p>
    </div>
  </div>

  <script>
    const STATION_LOGO = 'https://i.postimg.cc/28VKXjCx/logo.png';
    const STREAM_URL   = 'https://stream.laut.fm/retrodance';
    const LAUT_API     = 'https://api.laut.fm/station/retrodance';

    const player    = document.getElementById('player');
    const playBtn   = document.getElementById('play-btn');
    const playIcon  = document.getElementById('play-icon');
    const soundBars = document.getElementById('sound-bars');
    const volSlider = document.getElementById('vol-slider');
    const coverImg  = document.getElementById('cover-img');
    const artistEl  = document.getElementById('artist-el');
    const titleEl   = document.getElementById('title-el');
    const listenersEl = document.getElementById('listeners-el');

    let isPlaying = false;
    let isLoading = false;
    let initialized = false;

    const ICO_PLAY  = '<path d="M8 5.14v14l11-7-11-7z"/>';
    const ICO_STOP  = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    const ICO_LOAD  = '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40 20" class="spin"/>';

    function updateUI() {
      if (isLoading) {
        playIcon.innerHTML = ICO_LOAD;
        playIcon.setAttribute('fill', 'none');
      } else if (isPlaying) {
        playIcon.innerHTML = ICO_STOP;
        playIcon.setAttribute('fill', 'currentColor');
      } else {
        playIcon.innerHTML = ICO_PLAY;
        playIcon.setAttribute('fill', 'currentColor');
      }
      soundBars.classList.toggle('playing', isPlaying && !isLoading);
    }

    playBtn.addEventListener('click', function() {
      if (!isPlaying) {
        isLoading = true;
        updateUI();

        // МАГИЯ ДЛЯ IOS: Сначала присваиваем src, потом load, потом play
        player.src = STREAM_URL;
        player.load(); 
        
        const playPromise = player.play();
        
        if (playPromise !== undefined) {
          playPromise.then(() => {
            isPlaying = true;
            isLoading = false;
            updateUI();
          }).catch(error => {
            console.error("Ошибка iOS:", error);
            // Если ошибка, пробуем еще раз через секунду
            setTimeout(() => { player.play(); }, 500);
          });
        }
      } else {
        player.pause();
        player.src = ""; // Очистка потока
        isPlaying = false;
        isLoading = false;
        updateUI();
      }
    });

    // Слушатели событий плеера
    player.onplaying = () => { isPlaying = true; isLoading = false; updateUI(); };
    player.onwaiting = () => { isLoading = true; updateUI(); };
    player.onerror   = () => { console.error("Player Error"); isPlaying = false; isLoading = false; updateUI(); };

    volSlider.oninput = () => { player.volume = volSlider.value; };

    async function updateMetadata() {
      try {
        const res = await fetch(`${LAUT_API}/current_song?t=${Date.now()}`);
        const data = await res.json();
        if (data) {
          titleEl.textContent = data.title;
          artistEl.textContent = data.artist.name;
          
          const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(data.artist.name + ' ' + data.title)}&limit=1`);
          const itData = await itunes.json();
          const art = itData.results?.[0]?.artworkUrl100.replace('100x100', '600x600') || STATION_LOGO;
          if (coverImg.src !== art) coverImg.src = art;
        }
      } catch(e) {}
    }

    async function updateListeners() {
      try {
        const res = await fetch(`${LAUT_API}/listeners`);
        listenersEl.textContent = 'Слушатели: ' + (await res.text());
      } catch(e) {}
    }

    setInterval(updateMetadata, 10000);
    setInterval(updateListeners, 30000);
    updateMetadata();
    updateListeners();
  </script>
</body>
</html>
