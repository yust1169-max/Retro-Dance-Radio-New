<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/28VKXjCx/logo.png">
  <title>RetroDance Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0d0d0d;
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .app-bg {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .bg-sphere {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(225,29,72,0.18) 0%, transparent 70%);
      z-index: 0;
      filter: blur(80px);
      animation: sphereMove 30s infinite alternate linear;
      pointer-events: none;
    }

    @keyframes sphereMove {
      from { transform: translate(-15%, -15%) scale(1.2); }
      to   { transform: translate(15%, 15%) scale(0.9); }
    }

    .glass-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(45,0,10,0.88);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 48px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .live-badge {
      font-size: 10px;
      font-weight: 700;
      color: #e11d48;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .listeners-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.78);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .listeners-pill svg {
      width: 14px;
      height: 14px;
      color: #e11d48;
      flex-shrink: 0;
    }

    .cover-wrapper {
      width: 260px;
      height: 260px;
      margin: 0 auto 28px;
      background: #1a1a1a;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease-in-out;
    }

    .track-info { margin-bottom: 24px; }

    .station-name {
      font-size: 26px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      line-height: 1;
    }

    .accent { color: #e11d48; }

    #artist-el {
      font-size: 10px;
      font-weight: 700;
      color: #fb7185;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    #title-el {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1.25;
      min-height: 2.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
    }

    .custom-player {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #e11d48, #9f1239);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(225,29,72,0.4);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .play-btn:active { transform: scale(0.92); }

    .play-btn svg {
      width: 32px;
      height: 32px;
      display: block;
    }
    
    .ico-play-shape {
      transform: translateX(4px);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    .volume-wrap { display: flex; align-items: center; gap: 8px; }

    .mute-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.70);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mute-btn:active { transform: scale(0.94); }
    .mute-btn.is-muted { color: #e11d48; background: rgba(225,29,72,0.12); }
    .mute-btn svg { width: 18px; height: 18px; display: block; }

    .tabs {
      display: flex;
      gap: 4px;
      width: 100%;
      padding: 4px;
      margin: 0 0 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
    }

    .tab-btn {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 10px 8px;
      background: transparent;
      color: rgba(255,255,255,0.42);
      cursor: pointer;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active {
      background: #e11d48;
      color: white;
      box-shadow: 0 8px 22px rgba(225,29,72,0.25);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .vol-slider {
      -webkit-appearance: none;
      width: 70px;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e11d48;
      cursor: pointer;
    }

    .history-section { text-align: left; margin-bottom: 20px; }

    .history-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      opacity: 0.35;
      margin-bottom: 12px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .history-thumb {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      background: #1a1a1a;
    }

    .history-text { display: flex; flex-direction: column; overflow: hidden; }

    .history-artist { color: #fb7185; font-weight: 700; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-song-title { color: rgba(255,255,255,0.75); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .legal {
      font-size: 9px;
      opacity: 0.4;
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 20px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app-bg">
    <div class="bg-sphere"></div>

    <div class="glass-card">
      <div class="card-header">
        <span class="live-badge">● Live</span>
        <span class="listeners-pill" aria-label="Количество слушателей">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span id="listeners-el">0</span>
        </span>
      </div>

      <div class="cover-wrapper">
        <img id="cover-img" src="https://i.postimg.cc/28VKXjCx/logo.png" alt="Обложка">
      </div>

      <div class="track-info">
        <h1 class="station-name">Retro<span class="accent">Dance</span></h1>
        <p id="artist-el">Retro Radio</p>
        <p id="title-el">Нажмите Play</p>
      </div>

      <!-- Важно: атрибуты для мобильной совместимости -->
      <audio id="player" preload="none" playsinline webkit-playsinline></audio>

      <div class="tabs" role="tablist" aria-label="Разделы радио">
        <button class="tab-btn active" id="tab-player" type="button" data-tab="player" role="tab" aria-selected="true">Плеер</button>
        <button class="tab-btn" id="tab-history" type="button" data-tab="history" role="tab" aria-selected="false">История</button>
      </div>

      <div class="tab-panel active" id="panel-player" role="tabpanel" aria-labelledby="tab-player">
        <div class="custom-player">
          <button class="play-btn" id="play-btn" aria-label="Play/Pause">
            <svg id="play-svg" class="ico-play-shape" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 5v14l11-7z"/>
            </svg>
          </button>

          <div class="volume-wrap">
            <button class="mute-btn" id="mute-btn" type="button" aria-label="Выключить звук">
              <svg id="mute-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path id="mute-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
              </svg>
            </button>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="1" aria-label="Громкость">
          </div>
        </div>
      </div>

      <div class="tab-panel" id="panel-history" role="tabpanel" aria-labelledby="tab-history">
        <div class="history-section" id="history-section">
          <h3 class="history-label">История эфира</h3>
          <div id="history-list"></div>
        </div>
      </div>

      <div class="legal">
        <p>Radio-Hosting powered by <b>laut.fm</b> | Verantwortlich für die Inhalte: <b>laut.ag</b></p>
        <p style="margin-top: 8px;">Some content on this site is created with AI assistance. / Einige Inhalte dieser Website wurden mit Hilfe von KI erstellt.</p>
      </div>
    </div>
  </div>

  <script>
    const STATION_LOGO = 'https://i.postimg.cc/28VKXjCx/logo.png';
    const STREAM_URL   = 'https://stream.laut.fm/retrodance';
    const LAUT_API     = 'https://api.laut.fm/station/retrodance';

    const player    = document.getElementById('player');
    const playBtn   = document.getElementById('play-btn');
    const playSvg   = document.getElementById('play-svg');
    const volSlider = document.getElementById('vol-slider');
    const muteBtn   = document.getElementById('mute-btn');
    const mutePath  = document.getElementById('mute-path');
    const coverImg  = document.getElementById('cover-img');
    const artistEl  = document.getElementById('artist-el');
    const titleEl   = document.getElementById('title-el');
    const listenersEl = document.getElementById('listeners-el');
    const historySection = document.getElementById('history-section');
    const historyList    = document.getElementById('history-list');

    let isPlaying = false;
    let isLoading = false;
    let isMuted = false;
    let lastVolume = 1;
    let currentTrackId = "";
    let currentTrackTitle = "Нажмите Play";
    let currentTrackArtist = "Retro Radio";
    let currentArtwork = STATION_LOGO;
    let mediaSessionTimer = null;
    const coverCache = {};

    const SVG_PLAY = '<path d="M7 5v14l11-7z"/>';
    const SVG_STOP = '<path d="M6 6h12v12H6z"/>';
    const SVG_LOAD = '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40 20" fill="none" class="spin"/>';
    const VOL_HIGH = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
    const VOL_LOW  = 'M5 9v6h4l5 5V4L9 9H5zm13.5 3A4.5 4.5 0 0 0 16 7.97v8.05A4.5 4.5 0 0 0 18.5 12z';
    const VOL_MUTE = 'M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z';

    function updateUI() {
      if (isLoading) {
        playSvg.innerHTML = SVG_LOAD;
        playSvg.classList.remove('ico-play-shape');
      } else if (isPlaying) {
        playSvg.innerHTML = SVG_STOP;
        playSvg.classList.remove('ico-play-shape');
      } else {
        playSvg.innerHTML = SVG_PLAY;
        playSvg.classList.add('ico-play-shape');
      }
    }

    function updateVolumeIcon() {
      const value = Number(volSlider.value);
      if (isMuted || value === 0) {
        mutePath.setAttribute('d', VOL_MUTE);
        muteBtn.classList.add('is-muted');
        muteBtn.setAttribute('aria-label', 'Включить звук');
      } else if (value < 0.5) {
        mutePath.setAttribute('d', VOL_LOW);
        muteBtn.classList.remove('is-muted');
        muteBtn.setAttribute('aria-label', 'Выключить звук');
      } else {
        mutePath.setAttribute('d', VOL_HIGH);
        muteBtn.classList.remove('is-muted');
        muteBtn.setAttribute('aria-label', 'Выключить звук');
      }
    }


    function preloadImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(url);
        img.onerror = () => resolve(STATION_LOGO);
        img.src = url;
      });
    }

    function applyMediaSession() {
      document.title = `${currentTrackArtist} - ${currentTrackTitle} | RetroDance Radio`;

      // Дублируем данные прямо в audio: часть Android-плееров берёт заголовок отсюда.
      player.title = `${currentTrackArtist} - ${currentTrackTitle}`;

      if (!('mediaSession' in navigator)) return;

      const artwork = currentArtwork || STATION_LOGO;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: currentTrackTitle || 'RetroDance Radio',
        artist: currentTrackArtist || 'Retro Radio',
        album: 'RetroDance Radio',
        artwork: [
          { src: artwork, sizes: '96x96', type: 'image/jpeg' },
          { src: artwork, sizes: '128x128', type: 'image/jpeg' },
          { src: artwork, sizes: '192x192', type: 'image/jpeg' },
          { src: artwork, sizes: '256x256', type: 'image/jpeg' },
          { src: artwork, sizes: '512x512', type: 'image/jpeg' }
        ]
      });

      navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';

      try {
        navigator.mediaSession.setActionHandler('play', startRadio);
        navigator.mediaSession.setActionHandler('pause', stopRadio);
      } catch (e) {}
    }

    function keepMediaSessionAlive() {
      applyMediaSession();
      if (mediaSessionTimer) clearInterval(mediaSessionTimer);
      mediaSessionTimer = setInterval(() => {
        if (isPlaying) applyMediaSession();
      }, 3000);
    }

    async function setMainCover(art) {
      const safeArt = await preloadImage(art || STATION_LOGO);
      currentArtwork = safeArt;

      return new Promise((resolve) => {
        if (coverImg.src !== safeArt) {
          coverImg.style.opacity = 0;
          setTimeout(() => {
            coverImg.src = safeArt;
            coverImg.style.opacity = 1;
            applyMediaSession();
            resolve();
          }, 180);
        } else {
          coverImg.style.opacity = 1;
          applyMediaSession();
          resolve();
        }
      });
    }

    // Исправлено для Android Chrome:
    // 1) Не ставим crossorigin на <audio> — у radio-stream часто нет CORS-заголовков.
    // 2) Не вызываем player.load() прямо перед play() — на Android это может сбросить пользовательский tap.
    // 3) Не удаляем src при паузе — Chrome Android иногда после этого не стартует повторно.
    async function startRadio() {
      if (isLoading) return;

      isLoading = true;
      updateUI();

      try {
        if (!player.getAttribute('src')) {
          player.src = STREAM_URL;
        }

        player.volume = Number(volSlider.value);
        await player.play();

        isPlaying = true;
        isLoading = false;
        updateUI();
        keepMediaSessionAlive();
      } catch (err) {
        console.error('Playback Error:', err);

        // Мягкий фолбэк: если Android не принял старый поток, меняем URL,
        // но всё ещё НЕ вызываем load() перед play().
        try {
          player.src = STREAM_URL + '?t=' + Date.now();
          await player.play();

          isPlaying = true;
          isLoading = false;
          updateUI();
          keepMediaSessionAlive();
        } catch (err2) {
          console.error('Playback Fallback Error:', err2);
          isPlaying = false;
          isLoading = false;
          titleEl.textContent = 'Не удалось запустить радио';
          updateUI();
        }
      }
    }

    function stopRadio() {
      player.pause();
      isPlaying = false;
      isLoading = false;
      updateUI();
      applyMediaSession();
    }

    function toggleRadio(e) {
      if (e) e.preventDefault();
      if (isPlaying || isLoading) {
        stopRadio();
      } else {
        startRadio();
      }
    }

    playBtn.addEventListener('click', toggleRadio);

    player.addEventListener('playing', () => {
      isPlaying = true;
      isLoading = false;
      updateUI();
      keepMediaSessionAlive();
    });

    player.addEventListener('pause', () => {
      isPlaying = false;
      isLoading = false;
      updateUI();
      applyMediaSession();
    });

    player.addEventListener('waiting', () => {
      if (isPlaying) {
        isLoading = true;
        updateUI();
      }
    });

    player.addEventListener('error', () => {
      console.error('Audio element error:', player.error);
      isPlaying = false;
      isLoading = false;
      updateUI();
    });

    volSlider.oninput = () => {
      const value = Number(volSlider.value);
      player.volume = value;
      isMuted = value === 0;
      player.muted = isMuted;
      if (value > 0) lastVolume = value;
      updateVolumeIcon();
    };

    muteBtn.addEventListener('click', () => {
      if (isMuted || Number(volSlider.value) === 0) {
        isMuted = false;
        const restore = lastVolume > 0 ? lastVolume : 1;
        volSlider.value = restore;
        player.volume = restore;
        player.muted = false;
      } else {
        lastVolume = Number(volSlider.value) || lastVolume || 1;
        isMuted = true;
        volSlider.value = 0;
        player.muted = true;
      }
      updateVolumeIcon();
    });

    async function fetchCover(artist, title) {
      if (!artist || !title) return STATION_LOGO;
      const key = `${artist}|${title}`.toLowerCase();
      if (coverCache[key]) return coverCache[key];

      try {
        const query = encodeURIComponent(`${artist} ${title}`);
        const response = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1&entity=song`);
        const data = await response.json();
        if (data.results && data.results.length > 0) {
          const art = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg').replace('100x100', '600x600');
          coverCache[key] = art;
          return art;
        }
      } catch (e) {}

      coverCache[key] = STATION_LOGO;
      return STATION_LOGO;
    }

    async function updateMetadata() {
      try {
        const res = await fetch(`${LAUT_API}/current_song?t=${Date.now()}`);
        const data = await res.json();
        if (!data || !data.title) return;

        const artist = data.artist && data.artist.name ? data.artist.name : 'Retro Radio';
        const title = data.title;
        const trackKey = `${artist} - ${title}`;

        if (trackKey !== currentTrackId) {
          currentTrackId = trackKey;
          currentTrackTitle = title;
          currentTrackArtist = artist;

          titleEl.textContent = title;
          artistEl.textContent = artist;

          const art = await fetchCover(artist, title);

          // Важно: сначала обновляем обложку главного плеера и Media Session,
          // и только потом перерисовываем историю. Так история больше не обгоняет плеер.
          await setMainCover(art);
          keepMediaSessionAlive();
          updateHistory();
        } else {
          applyMediaSession();
        }
      } catch (e) {}
    }

    async function updateHistory() {
      try {
        const res = await fetch(`${LAUT_API}/last_songs`);
        const data = await res.json();
        if (!Array.isArray(data)) return;
        historyList.innerHTML = '';
        for (const song of data.slice(0, 5)) {
          const art = await fetchCover(song.artist.name, song.title);
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `
            <img class="history-thumb" src="${art}" onerror="this.src='${STATION_LOGO}'">
            <div class="history-text">
              <span class="history-artist">${song.artist.name}</span>
              <span class="history-song-title">${song.title}</span>
            </div>`;
          historyList.appendChild(item);
        }
        historySection.style.display = 'block';
      } catch (e) {}
    }

    async function updateListeners() {
      try {
        const res = await fetch(`${LAUT_API}/listeners`);
        const count = await res.text();
        listenersEl.textContent = count || 0;
      } catch (e) {}
    }

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach((b) => {
          const active = b.dataset.tab === tab;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          panel.classList.toggle('active', panel.id === 'panel-' + tab);
        });
        if (tab === 'history') updateHistory();
      });
    });

    updateVolumeIcon();
    applyMediaSession();
    setInterval(updateMetadata, 15000);
    setInterval(updateListeners, 45000);
    updateMetadata();
    updateListeners();
  </script>
</body>
</html>
