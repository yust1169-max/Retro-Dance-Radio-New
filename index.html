<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/28VKXjCx/logo.png">
  <title>RetroDance Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #1a0b36 0%, #0b041a 100%);
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 410px;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Верхняя панель */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px 16px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-title {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .brand-title span {
      color: #ff2a85;
    }

    .brand-subtitle {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .listeners-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 42, 133, 0.15);
      border: 1px solid rgba(255, 42, 133, 0.3);
      padding: 6px 12px;
      border-radius: 99px;
      color: #ff2a85;
      font-size: 11px;
      font-weight: 700;
    }

    .listeners-badge svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Главная карточка плеера */
    .main-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 36px;
      padding: 20px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .cover-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
      background: #110724;
    }

    #cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    /* Инфо-плашка поверх обложки снизу */
    .meta-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(11, 4, 26, 0.95) 85%);
      padding: 24px 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .track-details {
      overflow: hidden;
      padding-right: 10px;
      text-align: left;
    }

    .status-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      background: #ff2a85;
      color: white;
      padding: 2px 6px;
      border-radius: 6px;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    #title-el {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    #artist-el {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn:active { transform: scale(0.92); }
    .action-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Панель управления */
    .controls-panel {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .center-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
    }

    .play-btn {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: none;
      background: #ff2a85;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255, 42, 133, 0.4);
      transition: transform 0.2s, background-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 32px; height: 32px; fill: currentColor; }
    .ico-play { transform: translateX(3px); }

    @keyframes rotate { to { transform: rotate(360deg); } }
    .spin { animation: rotate 1s linear infinite; }

    .secondary-btn {
      position: absolute;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Громкость */
    #volume-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 0 10px;
    }

    .vol-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .vol-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
    }

    .vol-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff2a85;
      cursor: pointer;
      box-shadow: 0 0 10px #ff2a85;
    }

    .vol-value {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      min-width: 28px;
      text-align: right;
    }

    /* Табы / История */
    .tabs-nav {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tab-trigger {
      flex: 1;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      padding: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 10px;
      cursor: pointer;
    }

    .tab-trigger.active {
      background: rgba(255, 255, 255, 0.07);
      color: white;
    }

    .tab-content { display: none; margin-top: 10px; text-align: left; }
    .tab-content.active { display: block; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .history-cover { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #110724; }
    .history-meta { display: flex; flex-direction: column; overflow: hidden; }
    .history-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-artist { font-size: 11px; color: rgba(255, 255, 255, 0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .footer-credits {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Шапка бренда -->
    <div class="header-panel">
      <div class="brand">
        <img class="brand-logo" src="https://i.postimg.cc/28VKXjCx/logo.png" alt="Logo">
        <div class="brand-text">
          <span class="brand-title">Retro<span>Dance</span></span>
          <span class="brand-subtitle">Live Broadcast</span>
        </div>
      </div>
      <div class="listeners-badge">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm13 14v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span id="listeners-el">0</span>
      </div>
    </div>

    <!-- Основная дека плеера -->
    <div class="main-card">
      <div class="cover-container">
        <img id="cover-img" src="https://i.postimg.cc/28VKXjCx/logo.png" alt="Cover">
        
        <div class="meta-overlay">
          <div class="track-details">
            <span class="status-tag">Now Playing</span>
            <div id="title-el">Загрузка эфира...</div>
            <div id="artist-el">Retro Radio</div>
          </div>
          <div class="card-actions">
            <button class="action-btn" aria-label="Like"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
            <button class="action-btn" aria-label="Share"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
          </div>
        </div>
      </div>

      <!-- Кнопка Play и Ночной режим -->
      <div class="controls-panel">
        <div class="center-row">
          <button class="play-btn" id="play-btn" aria-label="Play">
            <svg id="play-svg" class="ico-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="secondary-btn" aria-label="Toggle Theme">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>

        <!-- Панель громкости (Автоматически скроется на iPhone) -->
        <div id="volume-panel">
          <button class="vol-btn" id="mute-btn">
            <svg viewBox="0 0 24 24" id="vol-svg">
              <path id="vol-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <div class="slider-container">
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="1">
          </div>
          <span class="vol-value" id="vol-text">100%</span>
        </div>
      </div>
    </div>

    <!-- Вкладки Плеер / История -->
    <div>
      <div class="tabs-nav">
        <button class="tab-trigger active" data-tab="history">История эфира</button>
      </div>
      <div class="tab-content active" id="tab-history">
        <div id="history-list"></div>
      </div>
    </div>

    <div class="footer-credits">
      <p>Radio-Hosting powered by <b>laut.fm</b> | Verantwortlich für die Inhalte: <b>laut.ag</b></p>
    </div>

  </div>

  <audio id="player" preload="none" playsinline webkit-playsinline></audio>

  <script>
    const STATION_LOGO = 'https://i.postimg.cc/28VKXjCx/logo.png';
    const STREAM_URL   = 'https://stream.laut.fm/retrodance';
    const LAUT_API     = 'https://api.laut.fm/station/retrodance';

    const player    = document.getElementById('player');
    const playBtn   = document.getElementById('play-btn');
    const playSvg   = document.getElementById('play-svg');
    const volSlider = document.getElementById('vol-slider');
    const volText   = document.getElementById('vol-text');
    const muteBtn   = document.getElementById('mute-btn');
    const volPath   = document.getElementById('vol-path');
    const coverImg  = document.getElementById('cover-img');
    const artistEl  = document.getElementById('artist-el');
    const titleEl   = document.getElementById('title-el');
    const listenersEl = document.getElementById('listeners-el');
    const historyList = document.getElementById('history-list');

    let isPlaying = false;
    let isLoading = false;
    let isMuted = false;
    let lastVolume = 1;
    let currentTrackId = "";
    const coverCache = {};

    const SVG_PLAY = '<path d="M8 5v14l11-7z"/>';
    const SVG_STOP = '<path d="M6 6h12v12H6z"/>';
    const SVG_LOAD = '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40 20" fill="none" class="spin"/>';
    
    const VOL_HIGH = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
    const VOL_LOW  = 'M5 9v6h4l5 5V4L9 9H5zm13.5 3A4.5 4.5 0 0 0 16 7.97v8.05A4.5 4.5 0 0 0 18.5 12z';
    const VOL_MUTE = 'M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z';

    function updateUI() {
      if (isLoading) {
        playSvg.innerHTML = SVG_LOAD;
        playSvg.classList.remove('ico-play');
      } else if (isPlaying) {
        playSvg.innerHTML = SVG_STOP;
        playSvg.classList.remove('ico-play');
      } else {
        playSvg.innerHTML = SVG_PLAY;
        playSvg.classList.add('ico-play');
      }
    }

    async function startRadio() {
      if (isLoading) return;
      isLoading = true;
      updateUI();
      try {
        if (!player.getAttribute('src')) player.src = STREAM_URL;
        player.volume = Number(volSlider.value);
        await player.play();
        isPlaying = true;
        isLoading = false;
        updateUI();
      } catch (err) {
        try {
          player.src = STREAM_URL + '?t=' + Date.now();
          await player.play();
          isPlaying = true;
          isLoading = false;
          updateUI();
        } catch (err2) {
          isPlaying = false;
          isLoading = false;
          titleEl.textContent = 'Ошибка запуска';
          updateUI();
        }
      }
    }

    function stopRadio() {
      player.pause();
      isPlaying = false;
      isLoading = false;
      updateUI();
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying || isLoading) stopRadio(); else startRadio();
    });

    volSlider.oninput = () => {
      const val = Number(volSlider.value);
      player.volume = val;
      volText.textContent = Math.round(val * 100) + '%';
      isMuted = val === 0;
      if (val > 0) lastVolume = val;
      updateVolumeIcon(val);
    };

    function updateVolumeIcon(val) {
      if (isMuted || val === 0) {
        volPath.setAttribute('d', VOL_MUTE);
      } else if (val < 0.5) {
        volPath.setAttribute('d', VOL_LOW);
      } else {
        volPath.setAttribute('d', VOL_HIGH);
      }
    }

    muteBtn.addEventListener('click', () => {
      if (isMuted) {
        isMuted = false;
        volSlider.value = lastVolume;
        player.volume = lastVolume;
        volText.textContent = Math.round(lastVolume * 100) + '%';
      } else {
        lastVolume = Number(volSlider.value) || 1;
        isMuted = true;
        volSlider.value = 0;
        player.volume = 0;
        volText.textContent = '0%';
      }
      updateVolumeIcon(Number(volSlider.value));
    });

    async function fetchCover(artist, title) {
      if (!artist || !title) return STATION_LOGO;
      const key = `${artist}|${title}`.toLowerCase();
      if (coverCache[key]) return coverCache[key];
      try {
        const query = encodeURIComponent(`${artist} ${title}`);
        const response = await fetch(`https://itunes.apple.com/search?term=${query}&limit=1&entity=song`);
        const data = await response.json();
        if (data.results && data.results.length > 0) {
          const art = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
          coverCache[key] = art;
          return art;
        }
      } catch (e) {}
      return STATION_LOGO;
    }

    async function updateMetadata() {
      try {
        const res = await fetch(`${LAUT_API}/current_song?t=${Date.now()}`);
        const data = await res.json();
        if (!data || !data.title) return;

        const artist = data.artist?.name || 'Retro Radio';
        const title = data.title;
        const trackKey = `${artist} - ${title}`;

        if (trackKey !== currentTrackId) {
          currentTrackId = trackKey;
          titleEl.textContent = title;
          artistEl.textContent = artist;
          
          const art = await fetchCover(artist, title);
          coverImg.style.opacity = 0;
          setTimeout(() => {
            coverImg.src = art;
            coverImg.style.opacity = 1;
          }, 150);
          
          updateHistory();
        }
      } catch (e) {}
    }

    async function updateHistory() {
      try {
        const res = await fetch(`${LAUT_API}/last_songs`);
        const data = await res.json();
        if (!Array.isArray(data)) return;
        historyList.innerHTML = '';
        for (const song of data.slice(0, 4)) {
          const art = await fetchCover(song.artist.name, song.title);
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `
            <img class="history-cover" src="${art}">
            <div class="history-meta">
              <span class="history-title">${song.title}</span>
              <span class="history-artist">${song.artist.name}</span>
            </div>`;
          historyList.appendChild(item);
        }
      } catch (e) {}
    }

    async function updateListeners() {
      try {
        const res = await fetch(`${LAUT_API}/listeners`);
        listenersEl.textContent = (await res.text()) || 0;
      } catch (e) {}
    }

    // НАДЕЖНОЕ СКРЫТИЕ ПОЛЗУНКА ДЛЯ APPLE (ИЗ AI STUDIO)
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || 
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
      const volPanel = document.getElementById('volume-panel');
      if (volPanel) volPanel.style.display = 'none';
    }

    setInterval(updateMetadata, 15000);
    setInterval(updateListeners, 45000);
    updateMetadata();
    updateListeners();
  </script>
</body>
</html>
